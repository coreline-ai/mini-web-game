<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>💩 Don't Get Pooped!</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d1a;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
      }
      * {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
