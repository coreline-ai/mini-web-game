<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>💩 Don't Get Pooped!</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d1a; /* 레터박스 여백은 깔끔한 단색(흐린 배경 없음) */
        overflow: hidden;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* 모바일: 주소창·소프트키 제외한 실제 보이는 높이에 맞춤 */
        background: #0b0d1a;
        /* 캔버스 중앙정렬은 Phaser Scale.CENTER_BOTH가 처리(flex 중복 금지) */
      }
      canvas {
        display: block;
      }
      * {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
