<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>💩 Don't Get Pooped!</title>
    <style>
      html,
      body {
        --game-stage-bg: linear-gradient(180deg, #0b0d1a 0%, #101827 100%);
        position: relative;
        isolation: isolate;
        margin: 0;
        height: 100%;
        background: #0f172a;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
      }
      body::before {
        z-index: 0;
        inset: -28px;
        background: var(--game-stage-bg);
        background-size: cover;
        background-position: center;
        filter: blur(16px) saturate(1.08);
        transform: scale(1.04);
      }
      body::after {
        z-index: 1;
        inset: 0;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.05) 0%, rgba(15, 23, 42, 0.16) 100%);
      }
      #game {
        position: relative;
        z-index: 2;
        width: 100vw;
        height: 100vh;
        background: transparent;
      }
      canvas {
        position: relative;
        z-index: 3;
        display: block;
      }
      * {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
